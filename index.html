<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XStream Mini App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
  margin-top:100px;
}
button{
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.watch{
  background:#ff0033;
  color:white;
}
.download{
  background:#0099ff;
  color:white;
}
.ads{
  margin:20px;
  padding:10px;
  border:1px dashed #555;
}
</style>
</head>
<body>

<h2>🎬 XStream Mini App</h2>

<div class="ads">AD SPACE TOP</div>

<button class="watch" onclick="watch()">▶ Watch Now</button>
<br>
<button class="download" onclick="download()">⬇ Download</button>

<div class="ads">AD SPACE BOTTOM</div>

<script>
const WATCH_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/"

const code = window.location.pathname.substring(1)

// URL-safe Base64 decode with padding fix
function decode(str){
    try{
        let s = str.replace(/-/g,'+').replace(/_/g,'/')
        while(s.length % 4) s += '=' // add padding if missing
        return atob(s)
    } catch(e){
        alert("Invalid link")
        return ""
    }
}

function watch(){
    const decoded = decode(code)
    if(decoded) window.location.href = WATCH_BASE + decoded
}

function download(){
    const decoded = decode(code)
    if(decoded) window.location.href = DOWNLOAD_BASE + decoded
}
</script>

</body>
</html>
