<style>

body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:sans-serif;
margin:0;
padding:0;
}

.banner{
width:100%;
max-width:728px;
margin:20px auto;
min-height:90px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #333;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;

}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

.watch{background:#ff0033;color:white;}
.download{background:#0099ff;color:white;}

.timer{

}

.spinner{
margin:15px auto;
width:40px;
height:40px;
border:4px solid #333;
border-top:4px solid #00ffc3;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.description{
max-width:700px;
margin:auto;
margin-top:20px;
font-size:15px;
color:#ccc;
}

footer{
margin-top:80px;
padding:20px;
border-top:1px solid #333;

}

</style>

<body>

<h2>🎬 XStream Mini App</h2>

<div class="description">
Please wait a few seconds before accessing the watch or download options.
</div>

<!-- EZmob Video Ad -->
<div id="video-ad"></div>

<script>

var pbjs = pbjs || {};
pbjs.que = pbjs.que || [];

pbjs.que.push(function(){

var adUnits=[{

code:'video-ad',

mediaTypes:{
video:{
context:'outstream',
playerSize:[640,360],
renderer:{
url:'https://docdn.ezmob.com/outstream_pb.js',
render:renderOutstream
}
}
},

bids:[{
bidder:'adkernel',
params:{
zoneId:342933,
host:'cpm.ezmob.com'
}
}]

}];

pbjs.addAdUnits(adUnits);

pbjs.requestBids({

bidsBackHandler:function(){

var bids=pbjs.getHighestCpmBids('video-ad');

if(bids.length){
pbjs.renderAd(document,bids[0].adId);
}

}

});

});

function renderOutstream(bid){

OutstreamPlayerPB(bid,{
displayMode:'floating',
transitions:true
});

}

</script>

<div class="timer">
⏳ Preparing your link... <span id="time">10</span>s
</div>

<div class="spinner"></div>

<!-- Banner Slot Top -->
<div class="banner">
Banner Ad Slot (728x90)
</div>

<button id="watchBtn" class="watch" disabled>
▶ Watch Now
</button>

<br>

<button id="downloadBtn" class="download" disabled>
⬇ Download
</button>

<!-- Banner Slot Bottom -->
<div class="banner">
Banner Ad Slot (728x90)
</div>

<footer>
© 2026 XStream Mini App
</footer>

<script>

const WATCH_BASE="https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE="https://opposite-juline-movies1234-531abe64.koyeb.app/"
const code=window.location.pathname.substring(1)

function decode(str){
try{
let s=str.replace(/-/g,'+').replace(/_/g,'/')
while(s.length%4) s+='='
return atob(s)
}catch{
return ""
}
}

async function showAd(){
try{
await show_10689414()
return true
}catch{
return false
}
}

async function watch(){
const ad=await showAd()
if(ad){
const decoded=decode(code)
if(decoded) window.location.href=WATCH_BASE+decoded
}
}

async function download(){
const ad=await showAd()
if(ad){
const decoded=decode(code)
if(decoded) window.location.href=DOWNLOAD_BASE+decoded
}
}

let seconds=10
const time=document.getElementById("time")
const watchBtn=document.getElementById("watchBtn")
const downloadBtn=document.getElementById("downloadBtn")

const timer=setInterval(()=>{

seconds--
time.innerText=seconds

if(seconds<=0){

clearInterval(timer)

document.querySelector(".spinner").style.display="none"

time.innerText="Ready"

watchBtn.disabled=false
downloadBtn.disabled=false

}

},1000)

watchBtn.addEventListener("click",watch)
downloadBtn.addEventListener("click",download)

</script>

</body>
</html>
