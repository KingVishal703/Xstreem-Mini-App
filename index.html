<html lang="en">
<head>

<style>

body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:sans-serif;
margin:0;
padding:0;
}

.description{
max-width:700px;
margin:auto;
margin-top:20px;
font-size:15px;
color:#ccc;
line-height:1.6;
}

.timer{
margin-top:20px;
font-size:20px;
color:#00ffc3;
font-weight:bold;
}

.spinner{
margin:15px auto;
width:40px;
height:40px;
border:4px solid #333;
border-top:4px solid #00ffc3;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

.watch{background:#ff0033;color:white;}
.download{background:#0099ff;color:white;}

.banner{
width:100%;
max-width:728px;
min-height:90px;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:1px solid #333;
color:#888;
}

footer{
margin-top:80px;
padding:20px;
border-top:1px solid #333;
font-size:14px;
color:#aaa;
}

footer a{
color:#00ffc3;
text-decoration:none;
margin:0 8px;
}

</style>
</head>

<body>

<h2>🎬 XStream Mini App</h2>

<div class="description">
This page redirects you to the secure video streaming player.<br>
Please wait a few seconds before accessing the watch or download options.
</div>

<!-- EZmob Video Ad -->
<div id="container-1"></div>

<script>
var pbjs = pbjs || {};
pbjs.que = pbjs.que || [];

pbjs.que.push(function() {

var adUnits = [{
code:'container-1',

mediaTypes:{
video:{
context:'outstream',
playerSize:[640,360],
renderer:{
url:'https://docdn.ezmob.com/outstream_pb.js',
render:renderOutstream
}
}
},

bids:[{
bidder:'adkernel',
params:{
zoneId:342933,
host:'cpm.ezmob.com'
}
}]

}];

pbjs.addAdUnits(adUnits);

pbjs.requestBids({
bidsBackHandler:function(){

var bids=pbjs.getHighestCpmBids('container-1');

if(bids.length){
pbjs.renderAd(document,bids[0].adId);
}

}

});

});

function renderOutstream(bid){

OutstreamPlayerPB(bid,{
displayMode:'floating',
transitions:true,
vpaidMode:2
});

}
</script>

<div class="timer">
⏳ Preparing your link... <span id="time">10</span>s
</div>

<div class="spinner"></div>

<!-- Banner Top -->
<div class="banner">
Banner Ad Slot
</div>

<br>

<button id="watchBtn" class="watch" disabled>▶ Watch Now</button>
<br>
<button id="downloadBtn" class="download" disabled>⬇ Download</button>

<!-- Banner Bottom -->
<div class="banner">
Banner Ad Slot
</div>

<footer>
© 2026 XStream Mini App

<a href="/terms.html">Terms</a> |
<a href="/disclaimer.html">Disclaimer</a> |
<a href="/contact.html">Contact</a>
</footer>

<script>

/* CONFIG */
const adsConfig = {
rewardedInterstitial:true,
rewardedPopup:false,
inAppInterstitial:false
}

/* BASE URL */

const WATCH_BASE="https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE="https://opposite-juline-movies1234-531abe64.koyeb.app/"
const code=window.location.pathname.substring(1)

/* DECODE */

function decode(str){

try{

let s=str.replace(/-/g,'+').replace(/_/g,'/')
while(s.length%4)s+='='
return atob(s)

}catch{

alert("Invalid link")
return ""

}

}

/* REWARDED ADS */

async function showRewardedAd(){

if(adsConfig.rewardedInterstitial){

try{
await show_10689414()
return true
}catch{
return false
}

}

return true

}

/* WATCH */

async function watch(){

const adShown=await showRewardedAd()

if(adShown){

const decoded=decode(code)

if(decoded)
window.location.href=WATCH_BASE+decoded

}

}

/* DOWNLOAD */

async function download(){

const adShown=await showRewardedAd()

if(adShown){

const decoded=decode(code)

if(decoded)
window.location.href=DOWNLOAD_BASE+decoded

}

}

/* TIMER */

let seconds=10

const time=document.getElementById("time")
const watchBtn=document.getElementById("watchBtn")
const downloadBtn=document.getElementById("downloadBtn")

const timer=setInterval(()=>{

seconds--
time.innerText=seconds

if(seconds<=0){

clearInterval(timer)

document.querySelector(".spinner").style.display="none"

time.innerText="Ready"

watchBtn.disabled=false
downloadBtn.disabled=false

}

},1000)

watchBtn.addEventListener("click",watch)
downloadBtn.addEventListener("click",download)

</script>

</body>
</html>
