<!DOCTYPE html>
<html>
<head>
<title>XStream</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
margin-top:120px;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.watch{
background:#ff0033;
color:white;
}

.download{
background:#0099ff;
color:white;
}

.ads{
margin:20px;
}

</style>

</head>

<body>

<h2>🎬 Watch Video</h2>

<!-- AD TOP -->
<div class="ads">
AD SPACE TOP
</div>

<button class="watch" onclick="watch()">🎬 Watch Now</button>

<br>

<button class="download" onclick="download()">⬇ Download</button>

<!-- AD BOTTOM -->
<div class="ads">
AD SPACE BOTTOM
</div>

<script>

const watch_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const download_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/"

const code = window.location.pathname.substring(1)

function decode(str){
try{
return atob(str.replace(/-/g,'+').replace(/_/g,'/'))
}catch{
return ""
}
}

function watch(){

const decoded = decode(code)

if(!decoded){
alert("Invalid Link")
return
}

window.location.href = watch_base + decoded

}

function download(){

const decoded = decode(code)

if(!decoded){
alert("Invalid Link")
return
}

window.location.href = download_base + decoded

}

</script>

</body>
</html>
