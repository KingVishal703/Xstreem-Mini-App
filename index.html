<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels App</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* MAIN CONTAINER */
.container {
  height: 100vh;
  width: 100vw;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

/* REEL */
.reel {
  height: 100vh;
  width: 100vw;
  scroll-snap-align: start;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* VIDEO */
video {
  height: 100%;
  width: 100%;
  object-fit: cover;
}

/* RIGHT ACTIONS */
.actions {
  position: absolute;
  right: 15px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  color: white;
  z-index: 10;
  text-align: center;
}

.btn {
  font-size: 24px;
  cursor: pointer;
}

/* CAPTION */
.caption {
  position: absolute;
  bottom: 60px;
  left: 15px;
  color: white;
  font-size: 14px;
  max-width: 70%;
}

/* LOADER */
.loader {
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script>

const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app/"; 
let videos = [];

// ================= LOAD =================
async function loadVideos() {
  document.getElementById("app").innerHTML =
    `<div class="loader">Loading Reels...</div>`;

  try {
    let res = await fetch(`${API}/api/reels`);
    let data = await res.json();

    videos = data.videos || [];

    if (!videos.length) {
      document.getElementById("app").innerHTML =
        `<div class="loader">No Videos Found</div>`;
      return;
    }

    render();

  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="loader">API Error</div>`;
  }
}

// ================= RENDER =================
function render() {

  let html = "";

  videos.forEach((v, i) => {
    html += `
      <div class="reel">
        <video id="video${i}" 
          src="" 
          muted 
          playsinline
          loop
        ></video>

        <div class="caption">${v.caption || ""}</div>

        <div class="actions">
          <div class="btn">❤️</div>
          <div class="btn">💬</div>
          <div class="btn">🔗</div>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;

  // load video URLs
  videos.forEach(async (v, i) => {
    let res = await fetch(`${API}/api/file?file_id=${v.file_id}`);
    let data = await res.json();

    if (data.url) {
      let vid = document.getElementById(`video${i}`);
      vid.src = data.url;
    }
  });

  setupAutoPlay();
}

// ================= AUTO PLAY =================
function setupAutoPlay() {
  const vids = document.querySelectorAll("video");

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      let video = entry.target;

      if (entry.isIntersecting) {
        video.play();
      } else {
        video.pause();
      }
    });
  }, { threshold: 0.7 });

  vids.forEach(v => observer.observe(v));
}

// ================= START =================
loadVideos();

</script>

</body>
</html>
