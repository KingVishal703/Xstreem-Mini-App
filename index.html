            hls.loadSource(video.querySelector("source").src);

            video.play().catch(()=>{});

});

<script>
/* ================== CONFIG ================== */
const adsConfig = {
  rewardedInterstitial: true,
  rewardedPopup: false,
  inAppInterstitial: false
};

/* ================== BASE URL ================== */
const WATCH_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/"
const code = window.location.pathname.substring(1)

/* ================== URL decode ================== */
function decode(str){
    try{
        let s = str.replace(/-/g,'+').replace(/_/g,'/')
        while(s.length % 4) s += '='
        return atob(s)
    } catch(e){
        alert("Invalid link")
        return ""
    }
}

/* ================== REWARDED ADS ================== */
async function showRewardedAd(){
    if(adsConfig.rewardedInterstitial){
        try{
            await show_10689414()
            return true
        } catch(e){ return false; }
    }
    return true
}

/* ================== CHROME FORCE OPEN FUNCTION ================== */
function openInChrome(url){
    // Android Chrome intent
    const intentUrl = "intent://" + url.replace("https://", "") + "#Intent;scheme=https;package=com.android.chrome;end";

    // Try Chrome
    window.location.href = intentUrl;

    // Fallback (agar Chrome nahi ho)
    setTimeout(()=>{
        window.location.href = url;
    }, 1500);
}

/* ================== WATCH / DOWNLOAD ================== */
async function watch(){
    const adShown = await showRewardedAd()
    if(adShown){
        const decoded = decode(code)
        if(decoded){
            let url = WATCH_BASE + decoded
            openInChrome(url)
        }
    }
}

async function download(){
    const adShown = await showRewardedAd()
    if(adShown){
        const decoded = decode(code)
        if(decoded){
            let url = DOWNLOAD_BASE + decoded
            openInChrome(url)
        }
    }
}

/* ================== TIMER ================== */
let seconds = 10
const time = document.getElementById("time")
const watchBtn = document.getElementById("watchBtn")
const downloadBtn = document.getElementById("downloadBtn")

const timer = setInterval(()=>{
    seconds--
    time.innerText = seconds
    if(seconds <= 0){
        clearInterval(timer)
        document.querySelector(".spinner").style.display="none"
        time.innerText="Ready"
        watchBtn.disabled=false
        downloadBtn.disabled=false
    }
},1000)

watchBtn.addEventListener("click", watch)
downloadBtn.addEventListener("click", download)
</script>
