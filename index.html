<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSTREEM Reels</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* CATEGORY BAR */
.cat-bar {
  position: absolute;
  top: 10px;
  left: 0;
  right: 0;
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 10px;
  z-index: 10;
}

.cat {
  padding: 6px 12px;
  background: rgba(255,255,255,0.2);
  color: white;
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
  font-size: 13px;
}

.cat.active {
  background: white;
  color: black;
}

/* VIDEO */
.video-container {
  height: 100vh;
  width: 100vw;
  position: relative;
}

video {
  height: 100%;
  width: 100%;
  object-fit: cover;
  background: black;
}

/* PROFILE */
.profile-bar {
  position: absolute;
  bottom: 90px;
  left: 15px;
  display: flex;
  align-items: center;
  color: white;
  gap: 10px;
  z-index: 2;
}

.dp {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: 2px solid white;
}

.username {
  font-weight: bold;
}

.caption {
  font-size: 13px;
  opacity: 0.8;
}

.loader {
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app";

let videos = [];
let filteredVideos = [];
let index = 0;
let selectedCategory = "all";
let currentVideo = null;

// ================= LOAD REELS =================
async function loadReels() {
  document.getElementById("app").innerHTML =
    `<div class="loader">Loading...</div>`;

  try {
    let res = await fetch(`${API}/api/reels`);
    let data = await res.json();

    videos = data.videos || [];

    if (!videos.length) {
      document.getElementById("app").innerHTML =
        `<div class="loader">No Videos Found</div>`;
      return;
    }

    setupCategories();
    applyFilter();

  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="loader">API Error</div>`;
  }
}

// ================= CATEGORY SYSTEM =================
function setupCategories() {
  let cats = ["all", ...new Set(videos.map(v => v.category))];

  let html = `<div class="cat-bar">` +
    cats.map(c => `
      <div class="cat ${c === selectedCategory ? "active" : ""}"
        onclick="selectCategory('${c}')">
        ${c.replace(/_/g, " ")}
      </div>
    `).join("") +
    `</div>`;

  document.getElementById("app").innerHTML += html;
}

function selectCategory(cat) {
  selectedCategory = cat;
  index = 0;
  setupCategories();
  applyFilter();
}

function applyFilter() {
  filteredVideos = (selectedCategory === "all")
    ? videos
    : videos.filter(v => v.category === selectedCategory);

  if (!filteredVideos.length) {
    document.getElementById("app").innerHTML =
      `<div class="loader">No Videos Found</div>`;
    return;
  }

  index = 0;
  loadVideo();
}

// ================= LOAD VIDEO =================
async function loadVideo(retry = 0) {

  if (index >= filteredVideos.length) index = 0;

  let v = filteredVideos[index];

  try {
    let res = await fetch(`${API}/api/file?file_id=${v.file_id}`);
    let data = await res.json();

    if (!data.url) throw new Error("No URL");

    v.url = data.url;
    render(v);

    preloadNext();

  } catch (e) {
    console.log("Skip video:", v.id);

    if (retry < 2) {
      return loadVideo(retry + 1);
    }

    index++;
    loadVideo(0);
  }
}

// ================= PRELOAD =================
function preloadNext() {
  let nextIndex = index + 1;
  if (nextIndex >= filteredVideos.length) return;

  let v = filteredVideos[nextIndex];

  fetch(`${API}/api/file?file_id=${v.file_id}`)
    .then(r => r.json())
    .then(data => {
      if (data.url) v.url = data.url;
    });
}

// ================= RENDER =================
function render(v) {

  document.getElementById("app").innerHTML = `
    <div class="video-container">

      <video id="video"
        autoplay
        muted
        playsinline
      >
        <source src="${v.url}" type="video/mp4">
      </video>

      <div class="profile-bar">
        <img class="dp" src="https://i.pravatar.cc/100">
        <div>
          <div class="username">@user_${v.id}</div>
          <div class="caption">${v.caption || ""}</div>
        </div>
      </div>

    </div>
  `;

  currentVideo = document.getElementById("video");
  currentVideo.play().catch(() => {});

  currentVideo.onended = next;
  currentVideo.onerror = next;

  track(v.id);
}

// ================= NEXT =================
function next() {
  index++;
  loadVideo();
}

// ================= TRACK =================
function track(id) {
  fetch(`${API}/api/track`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({video_id:id})
  });
}

// ================= SWIPE =================
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;

  if (startY - endY > 50) {
    next();
  }
});

// ================= START =================
loadReels();

</script>

</body>
</html>
