<script>
/* ================== CONFIG ================== */
const adsConfig = {
  rewardedInterstitial: true,  // Rewarded Interstitial on button click
  rewardedPopup: false,         // Rewarded Popup (pop)
  inAppInterstitial: false      // In-App Interstitial
};

/* ================== BASE URL ================== */
const WATCH_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/"
const code = window.location.pathname.substring(1)

/* ================== URL decode ================== */
function decode(str){
    try{
        let s = str.replace(/-/g,'+').replace(/_/g,'/')
        while(s.length % 4) s += '='
        return atob(s)
    } catch(e){
        alert("Invalid link")
        return ""
    }
}

/* ================== REWARDED ADS ================== */
async function showRewardedAd(){
    if(adsConfig.rewardedInterstitial){
        try{
            await show_10689414()  // Rewarded Interstitial
            return true
        } catch(e){ console.log("Interstitial ad skipped or error", e); return false; }
    }

    if(adsConfig.rewardedPopup){
        try{
            await show_10689414('pop') // Rewarded Popup
            return true
        } catch(e){ console.log("Popup ad skipped or error", e); return false; }
    }

    if(adsConfig.inAppInterstitial){
        try{
            await show_10689414({
                type: 'inApp',
                inAppSettings: { frequency:2, capping:0.1, interval:30, timeout:5, everyPage:false }
            })
            return true
        } catch(e){ console.log("In-App ad skipped or error", e); return false; }
    }

    // If no ads enabled, just return true
    return true
}

/* ================== WATCH / DOWNLOAD ================== */
async function watch(){
    const adShown = await showRewardedAd()
    if(adShown){
        const decoded = decode(code)
        if(decoded) window.location.href = WATCH_BASE + decoded
    }
}

async function download(){
    const adShown = await showRewardedAd()
    if(adShown){
        const decoded = decode(code)
        if(decoded) window.location.href = DOWNLOAD_BASE + decoded
    }
}

/* ================== TIMER ================== */
let seconds = 10
const time = document.getElementById("time")
const watchBtn = document.getElementById("watchBtn")
const downloadBtn = document.getElementById("downloadBtn")

const timer = setInterval(()=>{
    seconds--
    time.innerText = seconds
    if(seconds <= 0){
        clearInterval(timer)
        document.querySelector(".spinner").style.display="none"
        time.innerText="Ready"
        watchBtn.disabled=false
        downloadBtn.disabled=false
    }
},1000)

watchBtn.addEventListener("click", watch)
downloadBtn.addEventListener("click", download)
</script>
