<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>XStream Mini App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0b0b0b;color:white;text-align:center;font-family:sans-serif;margin:0;padding:0;}
button{padding:15px 30px;margin:10px;font-size:18px;border:none;border-radius:8px;cursor:pointer;}
button:disabled{opacity:0.4;cursor:not-allowed;}
.watch{background:#ff0033;color:white;}
.download{background:#0099ff;color:white;}
.timer{margin-top:20px;font-size:20px;color:#00ffc3;font-weight:bold;}
.spinner{margin:15px auto;width:40px;height:40px;border:4px solid #333;border-top:4px solid #00ffc3;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
footer{margin-top:80px;padding:20px;border-top:1px solid #333;font-size:14px;color:#aaa;}
footer a{color:#00ffc3;text-decoration:none;margin:0 8px;}
.description{max-width:700px;margin:auto;margin-top:20px;font-size:15px;color:#ccc;line-height:1.6;}
</style>
</head>
<body>

<h2>🎬 XStream Mini App</h2>

<div class="description">
Please wait a few seconds before accessing the watch or download options.
</div>

<div class="timer">⏳ Preparing your link... <span id="time">10</span>s</div>
<div class="spinner"></div>

<br>

<button id="watchBtn" class="watch" disabled>▶ Watch Now</button>
<br>
<button id="downloadBtn" class="download" disabled>⬇ Download</button>

<footer>
© 2026 XStream Mini App
</footer>

<script>

/* ================== BASE URL ================== */
const WATCH_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/"
const AD_LINK = "https://www.profitablecpmratenetwork.com/z8u7nf4tu?key=ce8abdc1b9d816d508004b6f3a5ca0a0"

const code = window.location.pathname.substring(1)

/* ================== DECODE ================== */
function decode(str){
    try{
        let s = str.replace(/-/g,'+').replace(/_/g,'/')
        while(s.length % 4) s += '='
        return atob(s)
    } catch(e){
        return ""
    }
}

/* ================== OPEN FUNCTION ================== */
function openInChrome(url){
    window.location.href = url;
}

/* ================== WATCH ================== */
function watch(){
    const decoded = decode(code);
    if(!decoded) return;

    // Step 1: Ad link open
    window.location.href = AD_LINK;

    // Step 2: Jab user back kare, tab ye chalega
    setTimeout(()=>{
        openInChrome(WATCH_BASE + decoded);
    }, 1500);
}

/* ================== DOWNLOAD ================== */
function download(){
    const decoded = decode(code);
    if(!decoded) return;

    window.location.href = AD_LINK;

    setTimeout(()=>{
        openInChrome(DOWNLOAD_BASE + decoded);
    }, 1500);
}

/* ================== TIMER ================== */
let seconds = 10;
const time = document.getElementById("time")
const watchBtn = document.getElementById("watchBtn")
const downloadBtn = document.getElementById("downloadBtn")

const timer = setInterval(()=>{
    seconds--
    time.innerText = seconds
    if(seconds <= 0){
        clearInterval(timer)
        document.querySelector(".spinner").style.display="none"
        time.innerText="Ready"
        watchBtn.disabled=false
        downloadBtn.disabled=false
    }
},1000)

watchBtn.addEventListener("click", watch)
downloadBtn.addEventListener("click", download)

</script>
</body>
</html>
