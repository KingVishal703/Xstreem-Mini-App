<!DOCTYPE html>
<html>
<head>
<title>XStream Player</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
  margin-top:50px;
}

video{
  width:80%;
  max-width:720px;
  margin:20px auto;
  display:block;
  border:2px solid #fff;
  border-radius:10px;
}

button{
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.watch{
  background:#ff0033;
  color:white;
}

.download{
  background:#0099ff;
  color:white;
}
</style>

</head>

<body>

<h2>🎬 Watch Video</h2>

<video id="player" controls poster="">
  Your browser does not support HTML5 video.
</video>

<br>

<button class="watch" onclick="watch()">▶ Watch Now</button>
<button class="download" onclick="download()">⬇ Download</button>

<script>
const watch_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const download_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/"

const code = window.location.pathname.substring(1)

function decode(str){
  return atob(str.replace(/-/g,'+').replace(/_/g,'/'))
}

// Set video preview on page load
const decoded = decode(code)
const video_url = watch_base + decoded
document.getElementById("player").src = video_url
document.getElementById("player").poster = "https://via.placeholder.com/720x400.png?text=Loading+Video"

function watch(){
  window.location.href = video_url
}

function download(){
  const download_url = download_base + decoded
  window.location.href = download_url
}
</script>

</body>
</html>
