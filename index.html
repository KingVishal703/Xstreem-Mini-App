<!DOCTYPE html>
<html>
<head>
<title>Watch Video</title>
<style>
body{
font-family:sans-serif;
text-align:center;
margin-top:100px;
}
button{
padding:15px 30px;
font-size:18px;
}
</style>
</head>

<body>

<h2>Watch Video</h2>
<p>Please wait 5 seconds...</p>

<button id="watch" disabled>Watch Now</button>

<script>
const params = new URLSearchParams(window.location.search);
const stream = params.get("stream");

let time = 5;

const btn = document.getElementById("watch");

let timer = setInterval(()=>{
time--;
if(time<=0){
btn.disabled=false;
btn.innerText="Watch Now";
clearInterval(timer);
}else{
btn.innerText="Wait "+time+"s";
}
},1000);

btn.onclick = ()=>{
window.location.href = stream;
};
</script>

</body>
</html>
