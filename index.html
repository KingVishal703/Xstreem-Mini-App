<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    .video-container {
      height: 100vh;
      width: 100%;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }

    .video {
      height: 100vh;
      width: 100%;
      scroll-snap-align: start;
      position: relative;
    }

    video {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }

    .caption {
      position: absolute;
      bottom: 80px;
      left: 10px;
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 10px;
    }

    .loading {
      color: white;
      text-align: center;
      margin-top: 50%;
    }
  </style>
</head>

<body>

<div class="video-container" id="feed">
  <div class="loading">Loading reels...</div>
</div>

<script>
const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app/";

async function loadVideos() {
  let res = await fetch(API + "/api/reels");
  let data = await res.json();

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  for (let v of data.videos) {

    let fileRes = await fetch(API + "/api/file?file_id=" + v.file_id);
    let fileData = await fileRes.json();

    let url = fileData.url;

    let div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <video src="${url}" autoplay muted loop></video>
      <div class="caption">${v.caption || "No Caption"}</div>
    `;

    feed.appendChild(div);
  }
}

loadVideos();
</script>

</body>
</html>
