<script>

/* BASE URL */

const WATCH_BASE="https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const DOWNLOAD_BASE="https://opposite-juline-movies1234-531abe64.koyeb.app/"

const code=window.location.pathname.substring(1)

/* DECODE */

function decode(str){

try{

let s=str.replace(/-/g,'+').replace(/_/g,'/')
while(s.length%4)s+='='
return atob(s)

}catch{

alert("Invalid link")
return ""

}

}

/* REWARDED */

async function showRewardedAd(){

try{
await show_10689414()
}catch(e){
console.log("Ad skipped")
}

return true

}

/* WATCH */

async function watch(){

await showRewardedAd()

const decoded=decode(code)

if(decoded){
window.location.href=WATCH_BASE+decoded
}

}

/* DOWNLOAD */

async function download(){

await showRewardedAd()

const decoded=decode(code)

if(decoded){
window.location.href=DOWNLOAD_BASE+decoded
}

}

/* TIMER */

let seconds=10

const time=document.getElementById("time")
const watchBtn=document.getElementById("watchBtn")
const downloadBtn=document.getElementById("downloadBtn")

const timer=setInterval(()=>{

seconds--
time.innerText=seconds

if(seconds<=0){

clearInterval(timer)

document.querySelector(".spinner").style.display="none"

time.innerText="Ready"

watchBtn.disabled=false
downloadBtn.disabled=false

}

},1000)

watchBtn.addEventListener("click",watch)
downloadBtn.addEventListener("click",download)

</script>
