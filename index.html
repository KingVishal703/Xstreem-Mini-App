<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSTREEM Reels</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

.video-container {
  height: 100vh;
  width: 100vw;
  position: relative;
}

video {
  height: 100%;
  width: 100%;
  object-fit: cover;
  background: black;
}

.profile-bar {
  position: absolute;
  bottom: 90px;
  left: 15px;
  display: flex;
  align-items: center;
  color: white;
  gap: 10px;
  z-index: 2;
}

.dp {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: 2px solid white;
}

.username {
  font-weight: bold;
}

.caption {
  font-size: 13px;
  opacity: 0.8;
}

.loader {
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app";

let videos = [];
let index = 0;
let currentVideo = null;

// ================= LOAD REELS =================
async function loadReels() {
  document.getElementById("app").innerHTML =
    `<div class="loader">Loading...</div>`;

  try {
    let res = await fetch(`${API}/api/reels`);
    let data = await res.json();

    videos = data.videos || [];

    if (!videos.length) {
      document.getElementById("app").innerHTML =
        `<div class="loader">No Videos Found</div>`;
      return;
    }

    index = 0;
    loadVideo();

  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="loader">API Error</div>`;
  }
}

// ================= LOAD VIDEO =================
async function loadVideo(retry = 0) {

  if (index >= videos.length) index = 0;

  let v = videos[index];

  try {
    let res = await fetch(`${API}/api/file?file_id=${v.file_id}`);
    let data = await res.json();

    if (!data.url) throw new Error("No URL");

    v.url = data.url;
    render(v);

    // preload next video
    preloadNext();

  } catch (e) {
    console.log("Skip video:", v.id);

    if (retry < 2) {
      return loadVideo(retry + 1);
    }

    index++;
    loadVideo(0);
  }
}

// ================= PRELOAD NEXT =================
function preloadNext() {
  let nextIndex = index + 1;
  if (nextIndex >= videos.length) return;

  let v = videos[nextIndex];

  fetch(`${API}/api/file?file_id=${v.file_id}`)
    .then(r => r.json())
    .then(data => {
      if (data.url) {
        v.url = data.url;
      }
    });
}

// ================= RENDER =================
function render(v) {

  document.getElementById("app").innerHTML = `
    <div class="video-container">

      <video id="video"
        autoplay
        muted
        playsinline
        controls
      >
        <source src="${v.url}" type="video/mp4">
      </video>

      <div class="profile-bar">
        <img class="dp" src="https://i.pravatar.cc/100">
        <div>
          <div class="username">@user_${v.id}</div>
          <div class="caption">${v.caption || ""}</div>
        </div>
      </div>

    </div>
  `;

  currentVideo = document.getElementById("video");

  // FIX autoplay issue
  currentVideo.play().catch(() => {});

  currentVideo.onended = next;
  currentVideo.onerror = next;

  track(v.id);
}

// ================= NEXT VIDEO =================
function next() {
  index++;
  loadVideo();
}

// ================= TRACK =================
function track(id) {
  fetch(`${API}/api/track`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({video_id:id})
  });
}

// ================= SWIPE =================
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;

  if (startY - endY > 50) {
    next();
  }
});

// ================= START =================
loadReels();

</script>

</body>
</html>
