<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

.video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

.bottom {
  position: absolute;
  bottom: 20px;
  left: 15px;
  color: white;
}

.profile {
  position: absolute;
  bottom: 90px;
  left: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.dp {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: gray;
}

.username {
  font-weight: bold;
}

.right {
  position: absolute;
  right: 15px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  color: white;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app/reels";

let videos = [];
let i = 0;

async function load() {
  let res = await fetch(API);
  let data = await res.json();

  videos = data.videos;
  render();
}

function render() {
  let v = videos[i];

  document.getElementById("app").innerHTML = `
    <video class="video" autoplay muted loop src="${v.url}"></video>

    <div class="profile">
      <div class="dp"></div>
      <div class="username">@user_${v.category}</div>
    </div>

    <div class="bottom">
      ${v.caption}
    </div>

    <div class="right">
      ❤️ Like
      💬 Comment
      🔗 Share
    </div>
  `;
}

document.addEventListener("click", () => {
  i = (i + 1) % videos.length;
  render();
});

load();
</script>

</body>
</html>
