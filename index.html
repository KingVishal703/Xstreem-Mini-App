<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSTREEM Reels</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

.video-container {
  height: 100vh;
  width: 100vw;
  position: relative;
}

video {
  height: 100%;
  width: 100%;
  object-fit: cover;
}

.profile-bar {
  position: absolute;
  bottom: 100px;
  left: 15px;
  display: flex;
  align-items: center;
  color: white;
  gap: 10px;
}

.dp {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: 2px solid white;
}

.username {
  font-weight: bold;
}

.caption {
  font-size: 13px;
  opacity: 0.8;
}

.loader {
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app";
const USER_ID = 123;

let videos = [];
let index = 0;

// LOAD
async function loadReels() {
  document.getElementById("app").innerHTML =
    `<div class="loader">Loading...</div>`;

  let res = await fetch(`${API}/api/reels`);
  let data = await res.json();

  videos = data.videos || [];

  if (!videos.length) {
    document.getElementById("app").innerHTML =
      `<div class="loader">No Videos Found</div>`;
    return;
  }

  index = 0;
  loadVideo();
}

// LOAD SINGLE VIDEO WITH URL FETCH
async function loadVideo() {

  if (index >= videos.length) index = 0;

  let v = videos[index];

  // GET REAL URL
  let res = await fetch(`${API}/api/file?file_id=${v.file_id}`);
  let data = await res.json();

  if (!data.url) {
    index++;
    return loadVideo();
  }

  v.url = data.url;

  render(v);
}

// RENDER
function render(v) {

  document.getElementById("app").innerHTML = `
    <div class="video-container">

      <video autoplay muted playsinline id="video"
        onended="next()"
        onerror="next()">

        <source src="${v.url}">
      </video>

      <div class="profile-bar">
        <img class="dp" src="https://i.pravatar.cc/100">
        <div>
          <div class="username">@user_${v.id}</div>
          <div class="caption">${v.caption || ""}</div>
        </div>
      </div>

    </div>
  `;

  track(v.id);
}

// NEXT
function next() {
  index++;
  loadVideo();
}

// TRACK
function track(id) {
  fetch(`${API}/api/track`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({video_id:id})
  });
}
  
// ================= ERROR HANDLER =================

  index++;
  showNextValid();
}

// ================= TRACK =================
// ================= PROFILE =================
function openProfile(id) {
  alert("Profile ID: " + id);
}

// ================= SWIPE =================
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;

  if (startY - endY > 50) {
    next();
  }
});

loadReels();

</script>

</body>
</html>
