<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>XStream Player</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<style>

body{
background:#0b0b0b;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
padding:0;
}

.player{
width:90%;
max-width:900px;
margin:auto;
margin-top:40px;
}

video{
width:100%;
border-radius:10px;
}

.buttons{
margin-top:30px;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.watch{
background:#ff0033;
color:white;
}

.download{
background:#0099ff;
color:white;
}

.ads{
margin:20px;
padding:10px;
border:1px dashed #555;
}

</style>

</head>

<body>

<h2>🎬 XStream Video Player</h2>

<div class="player">

<video id="player" controls>
</video>

</div>


<!-- ADS TOP -->

<div class="ads">
AD SPACE (TOP)
</div>


<div class="buttons">

<button class="watch" onclick="watch()">▶ Watch Now</button>

<br>

<button class="download" onclick="download()">⬇ Download</button>

</div>


<!-- ADS BOTTOM -->

<div class="ads">
AD SPACE (BOTTOM)
</div>



<script>

const watch_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const download_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/"

const code = window.location.pathname.substring(1)

function decode(str){
return atob(str.replace(/-/g,'+').replace(/_/g,'/'))
}

const decoded = decode(code)

const video_url = watch_base + decoded

document.getElementById("player").src = video_url


function watch(){

const final = watch_base + decoded

window.location.href = final

}

function download(){

const final = download_base + decoded

window.location.href = final

}

</script>

</body>
</html>
