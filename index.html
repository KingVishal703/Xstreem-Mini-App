<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels App</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* VIDEO */
.video-box {
  height: 100vh;
  width: 100vw;
  position: relative;
}

video {
  height: 100%;
  width: 100%;
  object-fit: cover;
  background: black;
}

/* LOADER */
.loader {
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

/* INFO */
.info {
  position: absolute;
  bottom: 80px;
  left: 15px;
  color: white;
  z-index: 2;
}

.title {
  font-weight: bold;
  font-size: 16px;
}

.cat {
  font-size: 12px;
  opacity: 0.7;
}

.views {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app";

let videos = [];
let index = 0;
let currentVideo = null;

// ================= LOAD =================
async function loadReels() {
  document.getElementById("app").innerHTML =
    `<div class="loader">Loading...</div>`;

  try {
    let res = await fetch(`${API}/api/reels`);
    let data = await res.json();

    videos = data.videos || [];

    if (!videos.length) {
      document.getElementById("app").innerHTML =
        `<div class="loader">No Videos Found</div>`;
      return;
    }

    loadVideo();

  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="loader">API Error</div>`;
  }
}

// ================= LOAD VIDEO =================
async function loadVideo(retry = 0) {

  if (index >= videos.length) index = 0;

  let v = videos[index];

  try {
    let res = await fetch(`${API}/api/file?file_id=${v.file_id}`);
    let data = await res.json();

    if (!data.url) throw new Error("No URL");

    v.url = data.url;
    render(v);
    preloadNext();

  } catch (e) {
    console.log("Skip:", v.id);

    if (retry < 2) return loadVideo(retry + 1);

    index++;
    loadVideo(0);
  }
}

// ================= PRELOAD =================
function preloadNext() {
  let next = index + 1;
  if (next >= videos.length) return;

  let v = videos[next];

  fetch(`${API}/api/file?file_id=${v.file_id}`)
    .then(r => r.json())
    .then(d => {
      if (d.url) v.url = d.url;
    });
}

// ================= RENDER =================
function render(v) {

  document.getElementById("app").innerHTML = `
    <div class="video-box">

      <video id="video"
        autoplay
        muted
        playsinline
      >
        <source src="${v.url}" type="video/mp4">
      </video>

      <div class="info">
        <div class="title">${v.caption || "No Caption"}</div>
        <div class="cat">📁 ${v.category}</div>
        <div class="views">👁️ ${v.views} views</div>
      </div>

    </div>
  `;

  currentVideo = document.getElementById("video");

  currentVideo.play().catch(()=>{});

  currentVideo.onended = next;
  currentVideo.onerror = next;

  track(v.id);
}

// ================= NEXT =================
function next() {
  index++;
  loadVideo();
}

// ================= TRACK =================
function track(id) {
  fetch(`${API}/api/track`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({video_id:id})
  });
}

// ================= SWIPE =================
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;

  if (startY - endY > 50) {
    next();
  }
});

// ================= START =================
loadReels();

</script>

</body>
</html>
