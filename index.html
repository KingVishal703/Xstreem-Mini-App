<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>XStream Player</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.player-box{
max-width:900px;
margin:auto;
border-radius:10px;
overflow:hidden;
}

video{
width:100%;
border-radius:10px;
}

.buttons{
margin-top:20px;
}

.btn{
padding:14px 25px;
margin:6px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.watch{
background:#ff0033;
color:white;
}

.download{
background:#0099ff;
color:white;
}

.title{
font-size:22px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="title">🎬 XStream Video Player</div>

<div class="player-box">
<video id="player" playsinline controls>
<source id="videosrc" src="" type="video/mp4">
</video>
</div>

<div class="buttons">

<button class="btn watch" onclick="watch()">
▶ Watch in Browser
</button>

<button class="btn download" onclick="download()">
⬇ Download Video
</button>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const watch_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/watch/"
const download_base = "https://opposite-juline-movies1234-531abe64.koyeb.app/"

const code = window.location.pathname.substring(1)

function decode(str){
return atob(str.replace(/-/g,'+').replace(/_/g,'/'))
}

const decoded = decode(code)

const watch_url = watch_base + decoded
const download_url = download_base + decoded

document.getElementById("videosrc").src = watch_url

const player = new Plyr('#player')

function watch(){
window.location.href = watch_url
}

function download(){
window.location.href = download_url
}

</script>

</body>
</html>
