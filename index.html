<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XStream Player</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:80px;
}

button{
padding:14px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.watch{
background:#ff0033;
color:white;
}

.download{
background:#0099ff;
color:white;
}

</style>

</head>
<body>

<h2>🎬 Open Video</h2>

<button class="watch" onclick="watch()">Watch Now</button>

<button class="download" onclick="download()">Download</button>


<script>

const BASE = "https://opposite-juline-movies1234-531abe64.koyeb.app/";

const path = window.location.pathname.replace("/","")

function decode(str){
return atob(str.replace(/_/g,'/').replace(/-/g,'+'))
}

let decoded = decode(path)

function watch(){

window.location.href = BASE + "watch/" + decoded

}

function download(){

window.location.href = BASE + decoded

}

</script>

</body>
</html>
