<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xstreem Reels</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  overflow: hidden;
}

/* ===== VIDEO ===== */
.video-container {
  height: 100vh;
  width: 100vw;
  position: relative;
}

video {
  height: 100%;
  width: 100%;
  object-fit: cover;
}

/* ===== BOTTOM USER BAR ===== */
.user-bar {
  position: absolute;
  bottom: 80px;
  left: 15px;
  display: flex;
  align-items: center;
  color: white;
  cursor: pointer;
}

.user-bar img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: 2px solid white;
  margin-right: 10px;
  object-fit: cover;
}

.username {
  font-weight: bold;
}

/* ===== CAPTION ===== */
.caption {
  position: absolute;
  bottom: 40px;
  left: 15px;
  color: white;
  font-size: 14px;
  max-width: 80%;
}

/* ===== PROFILE PANEL ===== */
.profile-panel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 40%;
  background: #111;
  color: white;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  transition: 0.3s;
  padding: 20px;
}

.profile-panel.active {
  bottom: 0;
}

.profile-header {
  display: flex;
  align-items: center;
}

.profile-header img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-right: 15px;
  border: 2px solid white;
}

.close-btn {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  font-size: 18px;
}

/* ===== TOP BAR ===== */
.top {
  position: absolute;
  top: 15px;
  left: 15px;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- PROFILE PANEL -->
<div id="profile" class="profile-panel">
  <div class="close-btn" onclick="closeProfile()">✖</div>

  <div class="profile-header">
    <img id="pdp" src="" />
    <div>
      <div id="pname" style="font-size:18px;font-weight:bold;"></div>
      <div style="font-size:12px;opacity:0.7;">Xstreem User</div>
    </div>
  </div>
</div>

<script>
const API = "https://annoyed-olivia-movies1234-4777a37f.koyeb.app/";
const USER_ID = 123;

let videos = [];
let current = 0;

// ===== LOAD VIDEOS =====
async function loadVideos() {
  let res = await fetch(`${API}/api/reels?user_id=${USER_ID}`);
  let data = await res.json();

  videos = data.videos || [];
  render();
}

// ===== RENDER =====
function render() {
  let v = videos[current];

  document.getElementById("app").innerHTML = `
    <div class="video-container">
      <video autoplay muted playsinline src="${v.url}"></video>

      <div class="top">XSTREEM</div>

      <div class="user-bar" onclick="openProfile('${v.user_name}','${v.user_dp}')">
        <img src="${v.user_dp}" />
        <div class="username">@${v.user_name}</div>
      </div>

      <div class="caption">${v.caption || ""}</div>
    </div>
  `;
}

// ===== NEXT VIDEO =====
document.addEventListener("touchend", e => {
  next();
});

function next() {
  current = (current + 1) % videos.length;
  render();
}

// ===== PROFILE OPEN =====
function openProfile(name, dp) {
  document.getElementById("profile").classList.add("active");
  document.getElementById("pdp").src = dp;
  document.getElementById("pname").innerText = name;
}

// ===== CLOSE PROFILE =====
function closeProfile() {
  document.getElementById("profile").classList.remove("active");
}

loadVideos();
</script>

</body>
</html>
